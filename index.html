<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>RüahEsh Worship</title>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root{
  --black:#0A0A0A;
  --white:#FFFFFF;
  --gold:#C7A55B;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  scroll-behavior:smooth;
}

body{
  font-family:Montserrat, sans-serif;
  background:var(--black);
  color:var(--white);
  overflow-x:hidden;
}

/* NAV */
nav{
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 60px;
  z-index:1000;
  background:rgba(10,10,10,0.6);
  backdrop-filter:blur(10px);
}

.logo{
  font-family:"Cormorant Garamond";
  font-size:22px;
  letter-spacing:3px;
  color:var(--gold);
}

nav ul{
  display:flex;
  gap:30px;
  list-style:none;
}

nav ul li{
  font-size:12px;
  text-transform:uppercase;
  letter-spacing:2px;
  cursor:pointer;
  color:var(--white);
  transition:0.3s;
}

nav ul li:hover{
  color:var(--gold);
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 8%;
  padding-top:80px;
}

.hero-text{
  width:45%;
}

.hero-text h1{
  font-family:"Cormorant Garamond";
  font-size:70px;
  letter-spacing:6px;
  color:var(--gold);
}

.hero-text h2{
  font-size:22px;
  margin-top:-10px;
  letter-spacing:3px;
}

.hero-text p{
  margin-top:25px;
  line-height:1.8;
  font-weight:300;
  opacity:0.9;
}

.btn{
  margin-top:35px;
  display:inline-block;
  padding:12px 28px;
  border:1px solid var(--gold);
  color:var(--gold);
  text-transform:uppercase;
  font-size:12px;
  letter-spacing:2px;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover{
  background:var(--gold);
  color:black;
}

.hero-img{
  width:50%;
  height:70vh;
  background:url('images/hero.jpg') center/cover no-repeat;
  filter:contrast(1.1) brightness(0.8);
  position:relative;
}

/* RESPONSIVE */
@media(max-width:900px){
  .hero{
    flex-direction:column;
    text-align:center;
  }

  .hero-text, .hero-img{
    width:100%;
  }

  .hero-text h1{
    font-size:48px;
  }

  .hero-img{
    height:50vh;
    margin-top:30px;
  }

  nav{
    padding:15px 20px;
  }

  nav ul{
    gap:15px;
  }
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
  <div class="logo">RÜAHESH</div>
  <ul>
    <li onclick="scrollToSection('hero')">Inicio</li>
    <li>Quiénes Somos</li>
    <li>Audiciones</li>
    <li>Convocatoria</li>
  </ul>
</nav>

<!-- HERO -->
<section class="hero" id="hero">

  <div class="hero-text">
    <h1>RÜAHESH</h1>
    <h2>WORSHIP</h2>

    <p>
      Exaltamos a Dios.<br/>
      Transformamos atmósferas.<br/>
      Llevamos Su presencia.
    </p>

    <div class="btn" onclick="alert('Ir a formulario')">
      Aplica Ahora
    </div>
  </div>

  <div class="hero-img"></div>

</section>

<script>
function scrollToSection(id){
  document.getElementById(id)?.scrollIntoView({behavior:"smooth"});
}
</script>

</body>
</html>
