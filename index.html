<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RüahEsh Worship</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #0b0d10;
      color: white;
    }

    .hero {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      overflow: hidden;
      background: radial-gradient(circle at center, #1a1d22 0%, #0b0d10 70%);
    }

    .hero-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.55);
    }

    .hero-content {
      position: relative;
      z-index: 2;
      max-width: 800px;
      padding: 20px;
    }

    .logo {
      font-size: 48px;
      letter-spacing: 6px;
      font-weight: 300;
      color: #C8A24A;
    }

    .subtitle {
      margin-top: 15px;
      font-size: 18px;
      opacity: 0.85;
      line-height: 1.6;
    }

    .btn {
      margin-top: 30px;
      padding: 14px 30px;
      font-size: 14px;
      letter-spacing: 2px;
      border: 1px solid #C8A24A;
      color: #C8A24A;
      background: transparent;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      display: inline-block;
    }

    .btn:hover {
      background: #C8A24A;
      color: #0b0d10;
    }

    .fade-in {
      animation: fadeIn 2s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>

  <section class="hero">
    <div class="hero-overlay"></div>

    <div class="hero-content fade-in">

      <div class="logo">
        RÜAHESH WORSHIP
      </div>

      <div class="subtitle">
        Un ministerio de adoración siendo formado para servir a la Iglesia con excelencia, unidad y reverencia.<br>
        Donde los corazones se convierten en adoración.
      </div>

      <a href="https://forms.gle/CjbjBbpHaVCSDwcY8" target="_blank" class="btn">
        APLICAR AHORA
      </a>

    </div>
  </section>

</body>
</html>
